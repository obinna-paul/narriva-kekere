<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F5EBDD;color:#2A1A12;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::selection{background:#C75D2C;color:#F5EBDD}
  button{font-family:inherit}
</style>
</helmet>

<div style="min-height:100vh;background:#F5EBDD">
  <div style="padding:18px 22px 0">
    <a href="Kekere - Feed.dc.html" style="font-size:20px;color:#6A5446">←</a>
  </div>
  <header style="padding:18px 22px 22px;text-align:center">
    <h1 style="font-family:'Fraunces',serif;font-weight:600;font-size:32px;color:#2A1A12">How can we help?</h1>
    <p style="margin-top:10px;font-size:14.5px;color:#6A5446">Ask us anything. We're friendly, promise.</p>
  </header>

  <div style="max-width:680px;margin:0 auto;padding:0 22px 8px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
    <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
      <button onClick="{{ t.onClick }}" style="cursor:pointer;font-size:13px;font-weight:600;padding:9px 15px;border-radius:30px;border:1px solid {{ t.border }};background:{{ t.bg }};color:{{ t.color }}">{{ t.label }}</button>
    </sc-for>
  </div>

  <section style="max-width:680px;margin:0 auto;padding:24px 22px 70px">
    <div style="border-top:1px solid rgba(42,26,18,0.12)">
      <sc-for list="{{ faqs }}" as="f" hint-placeholder-count="5">
        <div style="border-bottom:1px solid rgba(42,26,18,0.12)">
          <button onClick="{{ f.toggle }}" style="width:100%;background:transparent;border:none;cursor:pointer;text-align:left;padding:20px 0;display:flex;align-items:center;justify-content:space-between;gap:16px">
            <span style="font-size:16px;font-weight:600;color:#2A1A12;font-family:'Fraunces',serif">{{ f.q }}</span>
            <span style="flex:none;font-size:20px;color:#C75D2C;transform:rotate({{ f.rot }});transition:transform .25s">+</span>
          </button>
          <sc-if value="{{ f.open }}" hint-placeholder-val="{{ false }}">
            <p style="font-size:14.5px;line-height:1.65;color:#5A4636;padding:0 0 22px">{{ f.a }}</p>
          </sc-if>
        </div>
      </sc-for>
    </div>
    <div style="margin-top:34px;text-align:center;padding:26px;background:#fff;border:1px solid rgba(42,26,18,0.08);border-radius:16px">
      <p style="font-size:15px;color:#2A1A12">Still need us? <a href="#" style="color:#C75D2C;font-weight:600">Message the team</a> — a real person replies.</p>
    </div>
  </section>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:402,&quot;height&quot;:820}}">
class Component extends DCLogic {
  state = { tab: 'For Readers', open: 0 };
  renderVals() {
    const data = {
      'For Readers': [
        { q: 'What are cowries?', a: "Cowries are how you unlock stories on Kekere. Some stories are free; others cost a few cowries, and that goes straight to supporting the writer. Top up any time from your wallet." },
        { q: 'How long are the stories?', a: 'Short — most take between two and ten minutes to read. They\u2019re made for real life: a commute, a queue, the time before sleep.' },
        { q: 'Can I read offline?', a: 'Stories you\u2019ve unlocked stay in your library and remember where you left off, so you can pick up reading any time.' },
        { q: 'What does the completion rate mean?', a: 'When you see \u201c91% finish this,\u201d it means most readers who start the story read it all the way through. It\u2019s a small honest signal of how gripping a story is.' }
      ],
      'For Writers': [
        { q: 'How do I publish a story?', a: 'Open the writer\u2019s editor, write your story, set a tier, and submit for review. We read everything that comes in, properly, within five to seven business days.' },
        { q: 'How do I earn from my writing?', a: 'When readers unlock your story with cowries, a share goes to you. The more readers finish and share, the more your story travels.' },
        { q: 'What are the tiers?', a: 'Standard, Featured, and Premium set the cowrie range readers pay to unlock your story. Higher tiers are for longer or standout work — we\u2019ll guide you if you\u2019re unsure.' }
      ],
      'Cowries & Wallet': [
        { q: 'How do I top up?', a: 'Go to your wallet, tap Top up, choose a package, and pay with Paystack. Cowries are added instantly, and bigger packages come with bonus cowries.' },
        { q: 'Do cowries expire?', a: 'No. Cowries in your wallet stay there until you spend them.' },
        { q: 'Can I get a refund?', a: 'If something went wrong with a payment, message the team and we\u2019ll sort it out.' }
      ],
      'Account': [
        { q: 'How do I change my details?', a: 'Open your profile and tap Edit profile to update your name, photo, and bio.' },
        { q: 'How do I delete my account?', a: 'Message the team and we\u2019ll help you remove your account and data. No hoops.' }
      ]
    };
    const tabs = Object.keys(data);
    const cur = this.state.tab;
    const faqs = data[cur].map((f, i) => ({
      q: f.q, a: f.a, open: this.state.open === i, rot: this.state.open === i ? '45deg' : '0deg',
      toggle: () => this.setState({ open: this.state.open === i ? -1 : i })
    }));
    return {
      tabs: tabs.map(t => ({
        label: t, bg: cur === t ? '#C75D2C' : '#fff', color: cur === t ? '#fff' : '#6A5446',
        border: cur === t ? '#C75D2C' : 'rgba(42,26,18,0.14)',
        onClick: () => this.setState({ tab: t, open: 0 })
      })),
      faqs
    };
  }
}
</script>
</body>
</html>
