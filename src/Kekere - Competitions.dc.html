<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F5EBDD;color:#2A1A12;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::selection{background:#C75D2C;color:#F5EBDD}
</style>
</helmet>

<div style="min-height:100vh;background:#F5EBDD;padding-bottom:80px">
  <header style="padding:26px 22px 14px">
    <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#1F4B4B;font-weight:600;margin-bottom:10px">Competitions</div>
    <h1 style="font-family:'Fraunces',serif;font-weight:600;font-size:32px;line-height:1.08;color:#2A1A12">Enter the conversation</h1>
    <p style="margin-top:12px;font-size:14.5px;line-height:1.55;color:#6A5446">Seasonal prompts, real prizes, and a manuscript read at Narriva for every winner.</p>
  </header>

  <section style="padding:14px 22px 30px;display:flex;flex-direction:column;gap:18px">
    <sc-for list="{{ comps }}" as="c" hint-placeholder-count="4">
      <a href="Kekere - Competition Detail.dc.html" style="display:block;background:#fff;border:1px solid rgba(42,26,18,0.1);border-radius:18px;padding:24px;box-shadow:0 10px 26px -16px rgba(42,26,18,0.3)" style-hover="border-color:#C75D2C">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px">
          <span style="font-size:11px;font-weight:600;letter-spacing:0.03em;color:{{ c.statusColor }};background:{{ c.statusBg }};padding:5px 12px;border-radius:20px">{{ c.status }}</span>
          <sc-if value="{{ c.isOpen }}" hint-placeholder-val="{{ false }}"><span style="font-size:12.5px;font-weight:600;color:#C75D2C">{{ c.deadline }}</span></sc-if>
        </div>
        <h2 style="font-family:'Fraunces',serif;font-size:23px;font-weight:600;color:#2A1A12;line-height:1.16">{{ c.title }}</h2>
        <p style="margin-top:10px;font-size:14.5px;line-height:1.55;color:#6A5446">{{ c.theme }}</p>
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(42,26,18,0.08);display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:13px;color:#8A7565">{{ c.prize }}</span>
          <span style="font-size:13.5px;font-weight:600;color:#C75D2C">See competition →</span>
        </div>
      </a>
    </sc-for>
  </section>

  <!-- BOTTOM NAV -->
  <nav style="position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(245,235,221,0.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(42,26,18,0.1);padding:9px 8px 12px;display:flex;justify-content:space-around">
    <a href="Kekere - Feed.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>
      <span style="font-size:10px;font-weight:500">Feed</span>
    </a>
    <a href="Kekere - Writer.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19 L16 8 l3 3 L8 22 H5 Z"/><path d="M14 6 l3 3"/></svg>
      <span style="font-size:10px;font-weight:500">Write</span>
    </a>
    <a href="Kekere - Competitions.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#C75D2C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4 h12 v3 a6 6 0 0 1 -12 0 Z"/><path d="M12 13 v4 M9 21 h6 M9 21 a3 3 0 0 1 3 -4 M15 21 a3 3 0 0 0 -3 -4"/></svg>
      <span style="font-size:10px;font-weight:600">Competitions</span>
    </a>
    <a href="Kekere - Wallet.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="3"/><path d="M16 12 h2"/></svg>
      <span style="font-size:10px;font-weight:500">Wallet</span>
    </a>
    <a href="Kekere - Profile.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21 a7 7 0 0 1 14 0"/></svg>
      <span style="font-size:10px;font-weight:500">Profile</span>
    </a>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:402,&quot;height&quot;:820}}">
class Component extends DCLogic {
  renderVals() {
    return {
      comps: [
        { status: 'OPEN', statusColor: '#fff', statusBg: '#C75D2C', isOpen: true, deadline: '18 days left', title: 'The Heat Season', theme: 'A single hot afternoon. Whatever that means to you — write us 2,000 words of it.', prize: '₦150,000 + a Narriva read' },
        { status: 'JUDGING', statusColor: '#1F4B4B', statusBg: 'rgba(31,75,75,0.14)', isOpen: false, deadline: '', title: 'Letters We Never Sent', theme: 'An unsent letter, and the reason it stayed unsent. Entries are now with our judges.', prize: '₦120,000 + a Narriva read' },
        { status: 'COMPLETE', statusColor: '#fff', statusBg: '#2A1A12', isOpen: false, deadline: '', title: 'First Light', theme: 'A story that begins at dawn. Won by Emeka Obi for "The Fishermen of Epe."', prize: '₦100,000 + a Narriva read' },
        { status: 'CLOSED', statusColor: '#8A7565', statusBg: 'rgba(42,26,18,0.08)', isOpen: false, deadline: '', title: 'Market Day', theme: 'Set entirely in a market. Submissions are closed; results coming soon.', prize: '₦100,000 + a Narriva read' }
      ]
    };
  }
}
</script>
</body>
</html>
