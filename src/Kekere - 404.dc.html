<link rel="preconnect" href="https://fonts.googleapis.com">

  <div style="position:relative;text-align:center;max-width:420px">
    <div style="font-family:'Fraunces',serif;font-weight:600;font-size:21px;color:#E08A4A;margin-bottom:30px">Kekere</div>

    <a href="Kekere - Feed.dc.html" style="display:inline-block;margin-top:32px;font-size:16px;font-weight:600;color:#fff;background:#C75D2C;padding:15px 34px;border-radius:10px;box-shadow:0 12px 30px -10px rgba(199,93,44,0.6)" style-hover="background:#B14E22">Back to the feed</a>
  </div>
</div>
