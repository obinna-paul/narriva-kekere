<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F5EBDD;color:#2A1A12;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::selection{background:#C75D2C;color:#F5EBDD}
  button{font-family:inherit}
</style>
</helmet>

<div style="min-height:100vh;background:#F5EBDD;padding-bottom:80px">

  <header style="padding:26px 22px 8px">
    <h1 style="font-family:'Fraunces',serif;font-weight:600;font-size:30px;color:#2A1A12">Library</h1>
  </header>

  <!-- TABS -->
  <div style="position:sticky;top:0;z-index:20;background:rgba(245,235,221,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:10px 22px 12px;display:flex;gap:8px">
    <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
      <button onClick="{{ t.onClick }}" style="cursor:pointer;font-size:13.5px;font-weight:600;padding:9px 16px;border-radius:30px;border:1px solid {{ t.border }};background:{{ t.bg }};color:{{ t.color }}">{{ t.label }}</button>
    </sc-for>
  </div>

  <section style="padding:18px 22px 30px;display:flex;flex-direction:column;gap:14px">
    <sc-for list="{{ items }}" as="s" hint-placeholder-count="5">
      <a href="Kekere - Story Reader.dc.html" style="display:flex;gap:14px;background:#fff;border:1px solid rgba(42,26,18,0.08);border-radius:16px;padding:12px;align-items:center" style-hover="border-color:#C75D2C">
        <div style="flex:none;width:84px;height:84px;border-radius:12px;background:{{ s.pattern }};position:relative;overflow:hidden">
          <span style="position:absolute;bottom:6px;left:6px;font-size:8px;font-weight:700;color:#fff;background:rgba(31,75,75,0.8);padding:2px 6px;border-radius:20px">{{ s.genre }}</span>
        </div>
        <div style="flex:1;min-width:0">
          <h3 style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:#2A1A12;line-height:1.18">{{ s.title }}</h3>
          <div style="font-size:12.5px;color:#8A7565;margin-top:3px">{{ s.author }}</div>
          <sc-if value="{{ s.inProgress }}" hint-placeholder-val="{{ false }}">
            <div style="margin-top:9px;height:4px;border-radius:2px;background:rgba(42,26,18,0.1);overflow:hidden"><div style="height:100%;width:{{ s.pct }};background:#C75D2C"></div></div>
          </sc-if>
          <div style="margin-top:8px;font-size:12.5px;font-weight:600;color:{{ s.ctaColor }}">{{ s.cta }}</div>
        </div>
      </a>
    </sc-for>
  </section>

  <!-- BOTTOM NAV -->
  <nav style="position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(245,235,221,0.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(42,26,18,0.1);padding:9px 8px 12px;display:flex;justify-content:space-around">
    <a href="Kekere - Feed.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>
      <span style="font-size:10px;font-weight:500">Feed</span>
    </a>
    <a href="Kekere - Writer.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19 L16 8 l3 3 L8 22 H5 Z"/><path d="M14 6 l3 3"/></svg>
      <span style="font-size:10px;font-weight:500">Write</span>
    </a>
    <a href="Kekere - Competitions.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4 h12 v3 a6 6 0 0 1 -12 0 Z"/><path d="M12 13 v4 M9 21 h6 M9 21 a3 3 0 0 1 3 -4 M15 21 a3 3 0 0 0 -3 -4"/></svg>
      <span style="font-size:10px;font-weight:500">Competitions</span>
    </a>
    <a href="Kekere - Wallet.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="3"/><path d="M16 12 h2"/></svg>
      <span style="font-size:10px;font-weight:500">Wallet</span>
    </a>
    <a href="Kekere - Profile.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21 a7 7 0 0 1 14 0"/></svg>
      <span style="font-size:10px;font-weight:500">Profile</span>
    </a>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:402,&quot;height&quot;:820}}">
class Component extends DCLogic {
  state = { tab: 'Reading' };
  renderVals() {
    const pats = {
      radial: 'radial-gradient(circle at 30% 30%,#E2A565,#C75D2C 45%,#7A3415)',
      teal: 'conic-gradient(from 30deg,#1F4B4B,#2E6A5E,#1F4B4B,#143838,#1F4B4B)',
      checker: 'conic-gradient(#C75D2C 0 25%,#E2A565 0 50%,#C75D2C 0 75%,#E2A565 0)',
      stripe: 'repeating-linear-gradient(0deg,#2A1A12 0 6px,#3A2418 6px 12px)',
      tri: 'linear-gradient(135deg,#1F4B4B 0 50%,#E2A565 50% 100%)'
    };
    const data = {
      'Saved': [
        { genre: 'SPECULATIVE', title: 'Small Gods of Balogun', author: 'Yetunde Cole', pattern: pats.teal, inProgress: false, cta: 'Saved · 15 cowries to unlock', ctaColor: '#8A7565' },
        { genre: 'CRIME', title: 'Third Mainland', author: 'Dapo Ola', pattern: pats.stripe, inProgress: false, cta: 'Saved · 11 cowries to unlock', ctaColor: '#8A7565' },
        { genre: 'HUMOUR', title: 'Danfo Diaries', author: 'Kunle Bright', pattern: pats.radial, inProgress: false, cta: 'Saved · Free', ctaColor: '#1F6F4A' }
      ],
      'Unlocked': [
        { genre: 'LOVE', title: 'The Last Bus to Yaba', author: 'Funmi Adeleke', pattern: pats.radial, inProgress: false, cta: 'Unlocked · Read again', ctaColor: '#C75D2C' },
        { genre: 'HISTORICAL', title: 'Cowrie', author: 'Ada Eze', pattern: pats.checker, inProgress: false, cta: 'Unlocked · Read again', ctaColor: '#C75D2C' },
        { genre: 'SATIRE', title: 'Letters to NEPA', author: 'Sola Pratt', pattern: pats.stripe, inProgress: false, cta: 'Unlocked · Read again', ctaColor: '#C75D2C' }
      ],
      'Reading': [
        { genre: 'LOVE', title: 'The Last Bus to Yaba', author: 'Funmi Adeleke', pattern: pats.radial, inProgress: true, pct: '64%', cta: 'Continue reading →', ctaColor: '#C75D2C' },
        { genre: 'SPECULATIVE', title: 'The Mami Wata Line', author: 'Ngozi Umeh', pattern: pats.tri, inProgress: true, pct: '22%', cta: 'Continue reading →', ctaColor: '#C75D2C' },
        { genre: 'HISTORICAL', title: 'Cowrie', author: 'Ada Eze', pattern: pats.checker, inProgress: false, cta: 'Finished', ctaColor: '#1F6F4A' }
      ]
    };
    const tabs = [{ k: 'Saved', l: 'Saved' }, { k: 'Unlocked', l: 'Unlocked' }, { k: 'Reading', l: 'Reading History' }];
    const cur = this.state.tab;
    return {
      tabs: tabs.map(t => ({
        label: t.l, bg: cur === t.k ? '#C75D2C' : '#fff', color: cur === t.k ? '#fff' : '#6A5446',
        border: cur === t.k ? '#C75D2C' : 'rgba(42,26,18,0.14)',
        onClick: () => this.setState({ tab: t.k })
      })),
      items: data[cur]
    };
  }
}
</script>
</body>
</html>
