<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#FAF8F4;color:#161616;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::selection{background:#1E3A8A;color:#FAF8F4}
  .ph{background:repeating-linear-gradient(45deg,#ECE7DD,#ECE7DD 9px,#E6E0D4 9px,#E6E0D4 18px)}
</style>
</helmet>

<div style="min-height:100vh;background:#FAF8F4">
  <nav style="position:sticky;top:0;z-index:50;background:rgba(250,248,244,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(22,22,22,0.07)">
    <div style="max-width:1240px;margin:0 auto;padding:0 32px;height:74px;display:flex;align-items:center;justify-content:space-between">
      <a href="Narriva - Home.dc.html" style="font-family:'Fraunces',serif;font-weight:600;font-size:26px;color:#1E3A8A">Narriva</a>
      <div style="display:flex;align-items:center;gap:38px">
        <a href="Narriva - Bookstore.dc.html" style="font-size:15px;color:#161616">Books</a>
        <a href="Narriva - Services.dc.html" style="font-size:15px;color:#161616">Services</a>
        <a href="Narriva - Authors.dc.html" style="font-size:15px;color:#1E3A8A;font-weight:500">Authors</a>
        <a href="#" style="font-size:15px;color:#161616">Blog</a>
        <div style="width:1px;height:22px;background:rgba(22,22,22,0.12)"></div>
        <a href="#" style="font-size:15px;color:#161616">Sign in</a>
        <a href="Narriva - Submit.dc.html" style="font-size:14px;font-weight:500;color:#FAF8F4;background:#1E3A8A;padding:11px 20px;border-radius:2px">Submit Your Manuscript</a>
      </div>
    </div>
  </nav>

  <header style="max-width:1140px;margin:0 auto;padding:80px 32px 50px">
    <div style="font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#9A7B49;font-weight:500;margin-bottom:16px">Built here</div>
    <h1 style="font-family:'Fraunces',serif;font-weight:500;font-size:52px;letter-spacing:-0.02em;color:#161616">Authors</h1>
    <p style="margin-top:16px;font-size:17px;color:#55514A">The authors Narriva has worked with.</p>
  </header>

  <section style="max-width:1140px;margin:0 auto;padding:0 32px 110px">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:44px 36px">
      <sc-for list="{{ authors }}" as="a" hint-placeholder-count="6">
        <a href="Narriva - Author Detail.dc.html" style="display:block" style-hover="opacity:0.95">
          <div class="ph" style="aspect-ratio:4/5;border-radius:3px;position:relative;overflow:hidden">
            <span style="position:absolute;left:12px;bottom:10px;font-family:'Inter',monospace;font-size:10px;color:#A99F8E">author photo</span>
          </div>
          <h2 style="font-family:'Fraunces',serif;font-size:24px;font-weight:500;color:#161616;margin-top:18px">{{ a.name }}</h2>
          <p style="font-size:14.5px;font-style:italic;color:#6B675F;margin-top:6px;line-height:1.45">{{ a.desc }}</p>
          <span style="display:inline-block;margin-top:12px;font-size:13px;color:#1E3A8A;border-bottom:1px solid rgba(30,58,138,0.25)">View author →</span>
        </a>
      </sc-for>
    </div>
  </section>

  <footer style="background:#FAF8F4;border-top:1px solid rgba(22,22,22,0.08)">
    <div style="max-width:1240px;margin:0 auto;padding:56px 32px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:18px">
      <a href="Narriva - Home.dc.html" style="font-family:'Fraunces',serif;font-weight:600;font-size:22px;color:#1E3A8A">Narriva</a>
      <span style="font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:#B08D57">We work with authors at every stage — from a rough idea to a book worth reading.</span>
      <span style="font-size:13px;color:#8A857C">© 2026 Narriva</span>
    </div>
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    return {
      authors: [
        { name: 'Adaeze Okonkwo', desc: "Writes literary fiction about Lagos's coastal underworld." },
        { name: 'Tunde Bakare', desc: "Family sagas set across Nigeria's oil-boom decades." },
        { name: 'Ifeoma Nwosu', desc: 'Speculative fiction rooted in Yoruba cosmology.' },
        { name: 'Amara Diallo', desc: 'Quiet, devastating novels about water, memory, and debt.' },
        { name: 'Kwame Mensah', desc: 'Inheritance, silence, and the things fathers leave unsaid.' },
        { name: 'Zainab Bello', desc: 'Speculative Lagos, where the old gods never quite left.' }
      ]
    };
  }
}
</script>
</body>
</html>
