<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F5EBDD;color:#2A1A12;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::selection{background:#C75D2C;color:#F5EBDD}
  input,textarea{font-family:inherit;font-size:15px;color:#2A1A12;width:100%;background:#fff;border:1px solid rgba(42,26,18,0.16);border-radius:10px;padding:13px 15px;resize:none}
  input:focus,textarea:focus{outline:none;border-color:#C75D2C}
  label{display:block;font-size:13px;font-weight:600;color:#4A372C;margin-bottom:7px}
  button{font-family:inherit}
</style>
</helmet>

<div style="min-height:100vh;background:#F5EBDD;padding-bottom:80px">

  <!-- VIEW: PROFILE -->
  <sc-if value="{{ showProfile }}" hint-placeholder-val="{{ true }}">
    <section style="padding:44px 22px 30px;text-align:center">
      <div style="width:96px;height:96px;border-radius:50%;margin:0 auto;padding:4px;background:#C75D2C">
        <div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#E2A565,#C75D2C);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:34px;font-weight:600;color:#fff">N</div>
      </div>
      <h1 style="font-family:'Fraunces',serif;font-weight:600;font-size:26px;color:#2A1A12;margin-top:16px">Ngozi Okafor</h1>
      <p style="margin-top:8px;font-size:14.5px;line-height:1.5;color:#6A5446;max-width:300px;margin-left:auto;margin-right:auto">Reads on the bus, writes at night. Mostly love stories with bad weather in them.</p>
      <button onClick="{{ edit }}" style="margin-top:18px;cursor:pointer;border:1px solid rgba(42,26,18,0.16);background:transparent;color:#2A1A12;font-size:14px;font-weight:600;padding:10px 24px;border-radius:30px" style-hover="border-color:#C75D2C;color:#C75D2C">Edit profile</button>
    </section>

    <section style="padding:0 22px">
      <div style="font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#8A7565;font-weight:600;margin-bottom:12px">As a writer</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px">
        <sc-for list="{{ writerStats }}" as="s" hint-placeholder-count="3">
          <div style="background:#fff;border:1px solid rgba(42,26,18,0.08);border-radius:14px;padding:18px 12px;text-align:center">
            <div style="font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:#C75D2C">{{ s.val }}</div>
            <div style="font-size:11.5px;color:#8A7565;margin-top:4px;line-height:1.3">{{ s.label }}</div>
          </div>
        </sc-for>
      </div>
      <div style="font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#8A7565;font-weight:600;margin-bottom:12px">As a reader</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
        <sc-for list="{{ readerStats }}" as="s" hint-placeholder-count="2">
          <div style="background:#fff;border:1px solid rgba(42,26,18,0.08);border-radius:14px;padding:18px 12px;text-align:center">
            <div style="font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:#1F4B4B">{{ s.val }}</div>
            <div style="font-size:11.5px;color:#8A7565;margin-top:4px">{{ s.label }}</div>
          </div>
        </sc-for>
      </div>

      <a href="Kekere - Library.dc.html" style="display:block;margin-top:22px;text-align:center;font-size:14px;font-weight:600;color:#C75D2C;background:rgba(199,93,44,0.08);padding:14px;border-radius:12px">Go to my library →</a>
    </section>
  </sc-if>

  <!-- VIEW: EDIT -->
  <sc-if value="{{ showEdit }}" hint-placeholder-val="{{ false }}">
    <div style="padding:18px 22px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:26px">
        <button onClick="{{ cancel }}" style="background:none;border:none;cursor:pointer;font-size:15px;color:#8A7565">Cancel</button>
        <span style="font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:#2A1A12">Edit profile</span>
        <button onClick="{{ cancel }}" style="background:none;border:none;cursor:pointer;font-size:15px;font-weight:600;color:#C75D2C">Save</button>
      </div>
      <div style="text-align:center;margin-bottom:26px">
        <div style="width:84px;height:84px;border-radius:50%;margin:0 auto;background:linear-gradient(135deg,#E2A565,#C75D2C);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:#fff">N</div>
        <button style="margin-top:12px;cursor:pointer;background:none;border:none;font-size:13.5px;font-weight:600;color:#C75D2C">Change photo</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:18px">
        <div><label>Name</label><input value="Ngozi Okafor"></div>
        <div>
          <label>Bio</label>
          <textarea rows="3" maxlength="160">Reads on the bus, writes at night. Mostly love stories with bad weather in them.</textarea>
          <div style="margin-top:6px;text-align:right;font-size:12px;color:#A08C7C">81 / 160</div>
        </div>
      </div>
    </div>
  </sc-if>

  <!-- BOTTOM NAV -->
  <nav style="position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(245,235,221,0.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(42,26,18,0.1);padding:9px 8px 12px;display:flex;justify-content:space-around">
    <a href="Kekere - Feed.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>
      <span style="font-size:10px;font-weight:500">Feed</span>
    </a>
    <a href="Kekere - Writer.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19 L16 8 l3 3 L8 22 H5 Z"/><path d="M14 6 l3 3"/></svg>
      <span style="font-size:10px;font-weight:500">Write</span>
    </a>
    <a href="Kekere - Competitions.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4 h12 v3 a6 6 0 0 1 -12 0 Z"/><path d="M12 13 v4 M9 21 h6 M9 21 a3 3 0 0 1 3 -4 M15 21 a3 3 0 0 0 -3 -4"/></svg>
      <span style="font-size:10px;font-weight:500">Competitions</span>
    </a>
    <a href="Kekere - Wallet.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#A08C7C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="3"/><path d="M16 12 h2"/></svg>
      <span style="font-size:10px;font-weight:500">Wallet</span>
    </a>
    <a href="Kekere - Profile.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#C75D2C">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21 a7 7 0 0 1 14 0"/></svg>
      <span style="font-size:10px;font-weight:600">Profile</span>
    </a>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:402,&quot;height&quot;:820}}">
class Component extends DCLogic {
  state = { editing: false };
  renderVals() {
    return {
      showProfile: !this.state.editing,
      showEdit: this.state.editing,
      edit: () => this.setState({ editing: true }),
      cancel: () => this.setState({ editing: false }),
      writerStats: [
        { val: '3', label: 'Published stories' },
        { val: '4.2k', label: 'Total reads' },
        { val: '870', label: 'Cowries earned' }
      ],
      readerStats: [
        { val: '47', label: 'Stories read' },
        { val: '12', label: 'Stories saved' }
      ]
    };
  }
}
</script>
</body>
</html>
