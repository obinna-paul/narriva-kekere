<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kekere — Offline</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #F5EBDD;
    color: #2A1A12;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    text-align: center;
    padding: 24px;
  }
  h1 { font-size: 20px; margin: 0; }
  p { font-size: 14px; color: #8A7565; margin: 0; max-width: 320px; }
  button {
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #C75D2C;
    color: white;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 24px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <h1>You're offline</h1>
  <p>Kekere couldn't reach the network. Check your connection and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
